<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>智能装备研究院工作台 | 扫码入口</title>
    <style>
      :root {
        --ink: #101915;
        --muted: #687571;
        --green: #0f6b45;
        --gold: #cda349;
        --paper: #f5f5f7;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        align-items: center;
        background:
          radial-gradient(circle at 50% 8%, rgba(15, 107, 69, 0.11), transparent 28rem),
          radial-gradient(circle at 20% 82%, rgba(205, 163, 73, 0.1), transparent 22rem),
          linear-gradient(180deg, #fbfbfd, var(--paper));
        color: var(--ink);
        display: grid;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        padding: 48px 24px;
      }

      .stage {
        margin: 0 auto;
        max-width: 860px;
        text-align: center;
        width: 100%;
      }

      .logo-lockup {
        align-items: center;
        display: inline-flex;
        gap: 24px;
        justify-content: center;
        margin-bottom: 34px;
      }

      .logo-lockup img {
        filter: drop-shadow(0 14px 26px rgba(20, 35, 31, 0.09));
        object-fit: contain;
        height: 72px;
        width: 220px;
      }

      .dot {
        background: var(--gold);
        border-radius: 50%;
        height: 7px;
        width: 7px;
      }

      h1 {
        font-size: clamp(44px, 7vw, 86px);
        letter-spacing: 0;
        line-height: 1.04;
        margin: 0;
      }

      .subtitle {
        color: var(--muted);
        font-size: clamp(18px, 2vw, 24px);
        line-height: 1.7;
        margin: 24px auto 42px;
        max-width: 680px;
      }

      .qr-card {
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: 42px;
        box-shadow: 0 32px 90px rgba(20, 35, 31, 0.1);
        display: inline-grid;
        gap: 22px;
        padding: 32px;
      }

      .qr-card img {
        background: var(--white);
        border-radius: 28px;
        display: block;
        height: min(48vw, 360px);
        image-rendering: pixelated;
        padding: 18px;
        width: min(48vw, 360px);
      }

      .qr-card strong {
        color: var(--green);
        font-size: 20px;
      }

      .hint {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
        margin: 26px auto 0;
      }

      .url {
        color: var(--green);
        font-weight: 700;
      }

      @media (max-width: 640px) {
        body {
          padding: 32px 18px;
        }

        .logo-lockup {
          gap: 14px;
        }

        .logo-lockup img {
          height: 52px;
          width: 136px;
        }

        .qr-card {
          border-radius: 30px;
          padding: 22px;
          width: 100%;
        }

        .qr-card img {
          height: min(74vw, 340px);
          width: min(74vw, 340px);
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <div class="logo-lockup" aria-label="草业国创与蒙草联合标识">
        <img class="logo-main" src="assets/grassland-innovation-logo-web.png" alt="草业国创">
        <span class="dot" aria-hidden="true"></span>
        <img class="logo-sub" src="assets/mgrass-logo-cropped-web.png" alt="蒙草 M-GRASS">
      </div>
      <h1>扫码进入<br>智能装备研究院工作台</h1>
      <p class="subtitle">领导和参会人员可通过手机扫码查看部门动态、研发资讯、共享文档和项目介绍。</p>
      <section class="qr-card" aria-label="扫码访问入口">
        <img src="assets/cloud-site-qr-1200.png" alt="智能装备研究院工作台二维码">
        <strong>手机扫码访问工作台</strong>
      </section>
      <p class="hint">
        当前二维码指向云端演示站点，使用手机流量或任意 Wi-Fi 均可访问。<br>
        访问地址：<span class="url">https://leia8818.github.io/intelligent-equipment-workbench/</span>
      </p>
    </main>
  </body>
</html>
